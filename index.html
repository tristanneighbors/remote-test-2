<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RemoteTest</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">RemoteTest</p>
          <h1>Anime theme roulette</h1>
        </div>
        <div class="status-pill" aria-live="polite">
          <span class="status-dot" data-status-dot></span>
          <span data-status-label>Ready</span>
        </div>
      </header>

      <section class="workspace" aria-label="AnimeThemes player">
        <div class="player-panel">
          <div class="video-frame">
            <video class="is-active" data-player="active" controls playsinline preload="metadata"></video>
            <video data-player="buffer" playsinline preload="auto" muted aria-hidden="true" tabindex="-1"></video>
            <div class="empty-state" data-empty-state>
              <p>Press Random Video</p>
            </div>
          </div>

          <div class="now-playing">
            <div>
              <span class="metric-label">Anime</span>
              <strong data-anime-title>Waiting for a pick</strong>
            </div>
            <div>
              <span class="metric-label">Theme</span>
              <strong data-theme-title>--</strong>
            </div>
            <div>
              <span class="metric-label">Video</span>
              <strong data-video-meta>--</strong>
            </div>
          </div>
        </div>

        <aside class="control-panel" aria-label="Video controls">
          <div class="panel-head">
            <p class="section-label">AnimeThemes</p>
            <span data-clock>--:--:--</span>
          </div>

          <div class="warning-panel" data-warning hidden>
            <span>NSFW</span>
            <p>This entry is marked NSFW by AnimeThemes. Playback is not blocked.</p>
          </div>

          <div class="primary-stat">
            <span>Current file</span>
            <strong data-file-name>None loaded</strong>
          </div>

          <div class="button-row">
            <button class="primary-button" type="button" data-random-video>
              Random Video
            </button>
            <button class="secondary-button" type="button" data-replay disabled>
              Replay
            </button>
          </div>

          <dl class="detail-list" aria-label="Video details">
            <div>
              <dt>Source</dt>
              <dd data-source>--</dd>
            </div>
            <div>
              <dt>Resolution</dt>
              <dd data-resolution>--</dd>
            </div>
            <div>
              <dt>Size</dt>
              <dd data-size>--</dd>
            </div>
            <div>
              <dt>Flags</dt>
              <dd data-flags>--</dd>
            </div>
          </dl>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
