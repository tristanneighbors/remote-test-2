<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RemoteTest</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">RemoteTest</p>
          <h1>Connection monitor</h1>
        </div>
        <div class="status-pill" aria-live="polite">
          <span class="status-dot" data-status-dot></span>
          <span data-status-label>Ready</span>
        </div>
      </header>

      <section class="workspace" aria-label="Connection monitor">
        <div class="visual-panel">
          <canvas id="signalCanvas" width="900" height="560" aria-label="Live signal map"></canvas>
          <div class="readout-grid" aria-label="Connection statistics">
            <div>
              <span class="metric-label">Latency</span>
              <strong data-latency>-- ms</strong>
            </div>
            <div>
              <span class="metric-label">Checks</span>
              <strong data-checks>0</strong>
            </div>
            <div>
              <span class="metric-label">Uptime</span>
              <strong data-uptime>00:00</strong>
            </div>
          </div>
        </div>

        <aside class="control-panel" aria-label="Test controls">
          <div class="panel-head">
            <p class="section-label">Session</p>
            <time data-clock>--:--:--</time>
          </div>

          <div class="primary-stat">
            <span>Endpoint</span>
            <strong data-endpoint>remote-01</strong>
          </div>

          <div class="button-row">
            <button class="primary-button" type="button" data-run-test>
              Run test
            </button>
            <button class="secondary-button" type="button" data-reset>
              Reset
            </button>
          </div>

          <ol class="event-log" data-log aria-label="Event log">
            <li>Ready for first check.</li>
          </ol>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
