<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RemoteTest</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">RemoteTest</p>
          <h1>Anime theme queue</h1>
        </div>
        <div class="status-pill" aria-live="polite">
          <span class="status-dot" data-status-dot></span>
          <span data-status-label>Ready</span>
        </div>
      </header>

      <section class="workspace" aria-label="AnimeThemes queue player">
        <div class="player-panel">
          <div class="video-frame" data-video-frame>
            <video class="is-active" data-player="active" controls playsinline preload="metadata"></video>
            <video data-player="buffer" playsinline preload="auto" muted aria-hidden="true" tabindex="-1"></video>
            <div class="empty-state" data-empty-state>
              <p>Add Random</p>
            </div>
          </div>

          <div class="now-playing">
            <div>
              <span class="metric-label">English</span>
              <strong data-title-english>Not loaded</strong>
            </div>
            <div>
              <span class="metric-label">Japanese</span>
              <strong data-title-japanese>--</strong>
            </div>
            <div>
              <span class="metric-label">Theme</span>
              <strong data-theme-title>--</strong>
            </div>
          </div>
        </div>

        <aside class="control-panel" aria-label="Video controls">
          <div class="panel-head">
            <p class="section-label">AnimeThemes + MAL</p>
            <span data-clock>--:--:--</span>
          </div>

          <div class="warning-panel" data-warning hidden>
            <span>NSFW</span>
            <p>This entry is marked NSFW by AnimeThemes. Playback is not blocked.</p>
          </div>

          <div class="button-row">
            <button class="primary-button" type="button" data-add-random>
              Add Random
            </button>
            <button class="secondary-button" type="button" data-skip disabled>
              Skip
            </button>
          </div>

          <div class="button-row secondary-row">
            <button class="secondary-button" type="button" data-replay disabled>
              Replay
            </button>
            <button class="secondary-button" type="button" data-fullscreen>
              Fullscreen
            </button>
            <button class="secondary-button" type="button" data-clear-queue disabled>
              Clear
            </button>
          </div>

          <label class="toggle-row">
            <input type="checkbox" data-autoplay>
            <span>Autoplay queue</span>
          </label>

          <section class="queue-section" aria-label="Queued videos">
            <div class="queue-head">
              <p class="section-label">Queue</p>
              <span data-queue-count>0</span>
            </div>
            <ul class="queue-list" data-queue-list>
              <li class="queue-empty">Queue is empty.</li>
            </ul>
          </section>

          <dl class="detail-list" aria-label="MAL details">
            <div>
              <dt>MAL title</dt>
              <dd data-mal-title>--</dd>
            </div>
            <div>
              <dt>Year</dt>
              <dd data-year>--</dd>
            </div>
            <div>
              <dt>Studio</dt>
              <dd data-studio>--</dd>
            </div>
            <div>
              <dt>Score</dt>
              <dd data-score>--</dd>
            </div>
            <div>
              <dt>Rank</dt>
              <dd data-rank>--</dd>
            </div>
            <div>
              <dt>Genres</dt>
              <dd data-genres>--</dd>
            </div>
            <div>
              <dt>Video</dt>
              <dd data-video-meta>--</dd>
            </div>
            <div>
              <dt>Flags</dt>
              <dd data-flags>--</dd>
            </div>
          </dl>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
